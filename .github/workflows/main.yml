# Trigger CI on PR updates and main branch pushes
# Uses caching and selective path triggers to optimize performance

name: Robrix Rust CI

# Only `main` branch
on:
    push:
      branches:
        - robrix_ci_fmt
      paths:
        - packaging/**
        - resources/**
        - src/**
        - .github/**
        - Cargo.toml
        - rust-toolchain.toml

    pull_request:
      types: [opened, synchronize, reopened, ready_for_review]
      branches:
        - main
      paths:
        - packaging/**
        - resources/**
        - src/**
        - .github/**
        - Cargo.toml
        - rust-toolchain.toml

# Prevent concurrent CI runs and cancel in-progress runs on new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Global environment configuration
env:
    CARGO_TERM_COLOR: always
    CARGO_INCREMENTAL: "0"  # Disable incremental compilation in CI
    RUST_BACKTRACE: 1
    # Enable warnings as errors for strict checks
    RUSTFLAGS: "-D warnings"
    # For special compile
    rust_nightly: nightly-2024-10-20

