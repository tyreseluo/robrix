name: Robrix Cross-Platform Build Matrix

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]  
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # 第一步：只验证三个核心平台能否基本构建
  basic-build-test:
    name: Basic Build - ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (x86_64) - 对应 robrix-pre-alpha-3-linux-amd64.deb
          - os: linux
            runner: ubuntu-20.04  # 对应README中的Ubuntu 20.04
            target: x86_64-unknown-linux-gnu
            
          # Windows (x86_64) - 对应 robrix-pre-alpha-3-windows-x64-setup.exe  
          - os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            
          # macOS (aarch64) - 对应 robrix-pre-alpha-3-macOS-aarch64.dmg
          - os: macos
            runner: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
      
      # Linux特定依赖
      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libsqlite3-dev \
            pkg-config \
            binfmt-support \
            libxcursor-dev \
            libx11-dev \
            libasound2-dev \
            libpulse-dev \
            clang \
            libclang-dev
      
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.runner }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.runner }}-cargo-
      
      # 基础构建测试
      - name: Basic cargo check
        run: cargo check --target ${{ matrix.target }} --verbose
      
      - name: Basic cargo build
        run: cargo build --target ${{ matrix.target }} --verbose
        
      - name: Report build success
        run: |
          echo "✅ Basic build successful on ${{ matrix.os }} for ${{ matrix.target }}"
          echo "This validates that Robrix can be built on this platform."