name: Cross-Platform Build Matrix

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:  # 允许手动触发

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: 1

jobs:
  quick-checks:
    name: Quick Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo check
        run: cargo check --all-targets --all-features

      - name: Run clippy
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  build-matrix:
    name: Build on ${{ matrix.host }} for ${{ matrix.target }}
    runs-on: ${{ matrix.host }}
    needs: quick-checks
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            setup-deps: true
            
          # Windows builds
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            
          # macOS builds
          - host: macos-latest
            target: x86_64-apple-darwin
            
          - host: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.setup-deps && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libsqlite3-dev \
            pkg-config \
            libxcursor-dev \
            libx11-dev \
            libasound2-dev \
            libpulse-dev
      
      # Cache setup
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.host }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.host }}-${{ matrix.target }}-cargo-
            ${{ matrix.host }}-cargo-
      
      # Build step
      - name: Build for ${{ matrix.target }}
        run: cargo build --target ${{ matrix.target }} --release --verbose
          
      # Test step (only for native targets)
      - name: Run tests
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'x86_64-pc-windows-msvc' || matrix.target == 'x86_64-apple-darwin' || matrix.target == 'aarch64-apple-darwin'
        run: cargo test --target ${{ matrix.target }} --release
        
      # Check artifacts
      - name: Check build artifacts
        run: |
          echo "Build completed for ${{ matrix.target }}"
          ls -la target/${{ matrix.target }}/release/ || echo "Release directory not found"
        shell: bash

  # Android builds (separate job due to complexity)
  android-builds:
    name: Android Build on ${{ matrix.host }}
    runs-on: ${{ matrix.host }}
    needs: quick-checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            target: aarch64-linux-android
          - host: macos-latest
            target: aarch64-linux-android

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      # Setup Android NDK
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: false
          
      - name: Setup Android environment
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV
        shell: bash
        
      # Cache
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.host }}-android-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      # Build
      - name: Build Android
        run: cargo build --target ${{ matrix.target }} --release --verbose

  # iOS builds (macOS only)
  ios-builds:
    name: iOS Build
    runs-on: macos-latest
    needs: quick-checks
    strategy:
      fail-fast: false
      matrix:
        target: 
          - aarch64-apple-ios
          - x86_64-apple-ios
          - aarch64-apple-ios-sim

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-ios-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build iOS
        run: cargo build --target ${{ matrix.target }} --release --verbose

  # Build summary
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-matrix, android-builds, ios-builds]
    if: always()
    steps:
      - name: Check build results
        run: |
          echo "🔍 Build Results Summary:"
          echo "Main builds: ${{ needs.build-matrix.result }}"
          echo "Android builds: ${{ needs.android-builds.result }}"
          echo "iOS builds: ${{ needs.ios-builds.result }}"
          
          # Count successful builds
          success_count=0
          total_count=3
          
          if [ "${{ needs.build-matrix.result }}" == "success" ]; then
            success_count=$((success_count + 1))
          fi
          
          if [ "${{ needs.android-builds.result }}" == "success" ]; then
            success_count=$((success_count + 1))
          fi
          
          if [ "${{ needs.ios-builds.result }}" == "success" ]; then
            success_count=$((success_count + 1))
          fi
          
          echo "✅ Successful: $success_count/$total_count build groups"
          
          if [ $success_count -eq $total_count ]; then
            echo "🎉 All builds completed successfully!"
          else
            echo "⚠️  Some builds failed. Check individual job results above."
            echo "This is expected for initial testing - focus on getting core platforms working first."
          fi